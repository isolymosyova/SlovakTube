      // DYNAMICKÝ SOCIAL MEDIA THUMBNAIL
      function createThumbnail() {
        const canvas = document.createElement('canvas');
        canvas.width = 1200; canvas.height = 630;
        const ctx = canvas.getContext('2d');
        
        const gradient = ctx.createLinearGradient(0, 0, 1200, 630);
        gradient.addColorStop(0, '#ff4444'); gradient.addColorStop(1, '#cc0000');
        ctx.fillStyle = gradient; ctx.fillRect(0, 0, 1200, 630);
        
        ctx.fillStyle = 'white'; ctx.font = 'bold 80px Segoe UI, sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('SlovakTube', 600, 150);
        
        ctx.font = 'bold 50px Segoe UI, sans-serif';
        ctx.fillText('TOP 50 SLOVENSKÝCH', 600, 250);
        ctx.fillText('YOUTUBE KANÁLOV', 600, 320);
        
        const now = new Date();
        const monthNames = ['január','február','marec','apríl','máj','jún','júl','august','september','október','november','december'];
        const month = monthNames[now.getMonth()];
        ctx.font = 'bold 35px Segoe UI, sans-serif'; ctx.fillStyle = '#FFD700';
        ctx.fillText(`${month} ${now.getFullYear()}`, 600, 400);
        
        ctx.fillStyle = '#FF0000'; ctx.beginPath();
        ctx.arc(200, 450, 60, 0, 2 * Math.PI); ctx.fill();
        ctx.fillStyle = 'white'; ctx.beginPath();
        ctx.moveTo(230, 430); ctx.lineTo(230, 470); ctx.lineTo(270, 450); ctx.closePath(); ctx.fill();
        
        ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.font = 'bold 28px Segoe UI, sans-serif';
        ctx.fillText('slovaktube.sk', 600, 550);
        
        const dataUrl = canvas.toDataURL('image/png');
        document.querySelector('meta[property="og:image"]').setAttribute('content', dataUrl);
        document.querySelector('meta[name="twitter:image"]').setAttribute('content', dataUrl);
      }

      function updateMetaDate() {
        const now = new Date();
        const monthNames = ['január', 'február', 'marec', 'apríl', 'máj', 'jún',
                            'júl', 'august', 'september', 'október', 'november', 'december'];
        const month = monthNames[now.getMonth()];
        const year = now.getFullYear();
        
        const desc = document.querySelector('meta[name="description"]');
        if (desc) desc.setAttribute('content', desc.getAttribute('content').replace(/marec 2026/, `${month} ${year}`));
        document.title = document.title.replace('marec 2026', `${month} ${year}`);
        
        const schema = document.querySelector('script[type="application/ld+json"]');
        if (schema) {
          const data = JSON.parse(schema.textContent);
          data.datePublished = now.toISOString().split('T')[0];
          data.dateModified = now.toISOString().split('T')[0];
          schema.textContent = JSON.stringify(data);
        }
      }

      async function loadChannels() {
        const status = document.getElementById("status");
        status.innerHTML = '<div class="api-working">🔄 Načítavam 26 kanálov...</div>';

        let allData = [];
        for (let i = 0; i < SLOVAK_CHANNELS_50.length; i += 50) {
          const batch = SLOVAK_CHANNELS_50.slice(i, i + 50).join(",");
          try {
            const response = await fetch(
              `https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&id=${batch}&key=${API_KEY}`
            );
            const data = await response.json();
            allData = allData.concat(data.items || []);
            await new Promise((r) => setTimeout(r, 200));
          } catch (e) {
            console.log("Batch error:", i);
          }
        }

        allChannels = allData.filter((ch) => ch.statistics);
        status.innerHTML = `<div class="api-working">✅ Načítaných ${allChannels.length}/26 kanálov</div>`;

        if (allChannels.length === 0) {
          loadManualData50();
        } else {
          sortChannels("subs");
        }
      }

      function loadManualData50() {
        allChannels = Array(26).fill().map((_, i) => ({
          id: `demo${i + 1}`,
          snippet: { title: `Slovenský kanál #${i + 1}`, thumbnails: { medium: { url: "" } } },
          statistics: {
            subscriberCount: Math.floor(Math.random() * 500000 + 10000),
            viewCount: Math.floor(Math.random() * 100000000 + 1000000),
            videoCount: Math.floor(Math.random() * 1000 + 50),
          },
        }));
        sortChannels("subs");
      }

      function sortChannels(type) {
        document.querySelectorAll(".ranking-btn").forEach((btn) => btn.classList.remove("active"));
        event.target.classList.add("active");

        const sorted = [...allChannels].sort((a, b) => {
          const key = type === "subs" ? "subscriberCount" : 
                      type === "views" ? "viewCount" : "videoCount";
          return parseInt(b.statistics[key]) - parseInt(a.statistics[key]);
        });

        displayTable(sorted);
      }

      function displayTable(channels) {
        const tbody = document.getElementById("table-body");
        tbody.innerHTML = channels.slice(0, 26).map((channel, i) => {
          const stats = channel.statistics;
          const title = channel.snippet?.title || "Názov";
          const avatar = channel.snippet?.thumbnails?.medium?.url || "";
          
          return `
            <tr onclick="window.open('https://youtube.com/channel/${channel.id}')">
              <td class="rank">${i + 1}.</td>
              <td class="channel-col">
                <div class="channel-avatar-table" style="background-image: url('${avatar}');"></div>
                <div class="channel-name-table">${title}</div>
              </td>
              <td class="stat-col subs-col">${formatNumber(stats.subscriberCount)}</td>
              <td class="stat-col views-col">${formatNumber(stats.viewCount)}</td>
              <td class="stat-col videos-col">${formatNumber(stats.videoCount)}</td>
            </tr>
          `;
        }).join("");
      }

      function formatNumber(num) {
        if (!num) return "0";
        const n = parseInt(num);
        if (n >= 1e9) return (n / 1e9).toFixed(1) + "B";
        if (n >= 1e6) return (n / 1e6).toFixed(1) + "M";
        if (n >= 1e3) return (n / 1e3).toFixed(1) + "K";
        return n;
      }

      window.addEventListener('load', () => {
        createThumbnail();
        updateMetaDate();
        loadChannels();
      });
    </script>
